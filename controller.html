<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>スーパードルフィン コントローラー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0a1018; color: #fff;
      font-family: 'Hiragino Maru Gothic ProN', 'Yu Gothic', sans-serif;
      height: 100dvh; display: flex; flex-direction: column;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }
    #https-warn {
      display: none; background: #332200; border-bottom: 1px solid #f80;
      color: #fb3; font-size: 12px; padding: 8px; text-align: center; line-height: 1.5;
    }
    #https-warn.show { display: block; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; flex-shrink: 0; gap: 8px;
    }
    #title { font-size: 13px; color: #8aa; letter-spacing: 0.08em; }
    #sensor-btn {
      font-size: 13px; font-weight: 800; padding: 7px 16px; border-radius: 999px;
      border: 2px solid #555; background: #1a1a22; color: #999;
    }
    #sensor-btn.on { border-color: #4f4; background: rgba(0,200,0,0.15); color: #4f4; }

    /* 役割ヘッダー */
    #role-head {
      flex-shrink: 0; text-align: center; padding: 10px;
      display: flex; flex-direction: column; gap: 2px;
    }
    #role-icon { font-size: 2.6rem; line-height: 1; }
    #role-label { font-size: 1.5rem; font-weight: 900; }
    #role-instr { font-size: 0.85rem; color: #9bb; }

    /* 操作エリア */
    #pad { flex: 1; display: flex; gap: 12px; padding: 10px 12px 16px; min-height: 0; }
    .ctrl {
      flex: 1; border: none; border-radius: 22px; color: #fff;
      font-size: clamp(1.4rem, 7vw, 3rem); font-weight: 900;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      touch-action: none; transition: transform 0.06s, filter 0.08s;
    }
    .ctrl small { font-size: 0.4em; opacity: 0.85; letter-spacing: 0.1em; }
    .ctrl.active, .ctrl:active { transform: scale(0.95); filter: brightness(1.4); }
    .c-left   { background: linear-gradient(160deg, #1a6fff, #0040cc); box-shadow: 0 6px 20px rgba(0,80,255,.4); }
    .c-right  { background: linear-gradient(160deg, #ff3b3b, #cc0000); box-shadow: 0 6px 20px rgba(255,40,40,.4); }
    .c-jump   { background: linear-gradient(160deg, #00e676, #00a152); box-shadow: 0 6px 20px rgba(0,200,80,.4); }
    .c-dash   { background: linear-gradient(160deg, #ffab40, #ff6d00); box-shadow: 0 6px 20px rgba(255,140,0,.4); }
    .c-special{ background: linear-gradient(160deg, #ffe14d, #ffab00); color:#3a2; box-shadow: 0 6px 20px rgba(255,200,0,.4); }

    /* 傾きメーター */
    #tilt-wrap { flex-shrink: 0; padding: 0 14px 8px; display: none; }
    #tilt-wrap.show { display: block; }
    #tilt-bar { position: relative; height: 28px; background: #15151c; border-radius: 14px; border: 2px solid #333; overflow: hidden; }
    #tilt-needle { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #fff; border-radius: 50%; transform: translate(-50%,-50%); transition: left .05s linear; box-shadow: 0 0 8px #fff; }

    #status { flex-shrink: 0; text-align: center; padding: 8px; font-size: 14px; font-weight: 700; min-height: 38px; color: #8aa; }
    #status.err { color: #fb3; }
    #status.ok { color: #4f4; }

    /* 待機画面 */
    #wait { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 20px; text-align: center; }
    #wait input { font-size: 16px; padding: 10px 14px; border-radius: 10px; border: 2px solid #345; background: #11161f; color: #fff; width: min(280px, 80vw); text-align: center; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="https-warn">⚠ センサーには HTTPS が必要です。アドレスを <b>https://</b> でアクセスしてください。</div>

  <header>
    <span id="title">🐬 スーパードルフィン</span>
    <button id="sensor-btn">センサー: OFF</button>
  </header>

  <!-- 参加待ち -->
  <div id="wait">
    <div style="font-size:1.1rem; font-weight:800;">なまえを入れて参加</div>
    <input id="name-input" maxlength="8" placeholder="なまえ（8文字まで）" />
    <button id="join-btn" class="ctrl c-jump" style="flex:0; padding:14px 30px; border-radius:999px; font-size:1.2rem;">参加する</button>
    <div style="font-size:.8rem; color:#789;">大画面でスタートすると役割が届きます</div>
  </div>

  <!-- 役割UI -->
  <div id="role-head" class="hidden">
    <span id="role-icon">🎮</span>
    <span id="role-label">役割まちうけ</span>
    <span id="role-instr"></span>
  </div>
  <div id="tilt-wrap"><div id="tilt-bar"><div id="tilt-needle"></div></div></div>
  <div id="pad" class="hidden"></div>

  <div id="status">未接続</div>

  <script type="module">
    import { ROLE_INFO } from './src/data/roles.js';

    const $ = (id) => document.getElementById(id);
    const statusEl = $('status');
    const sensorBtn = $('sensor-btn');

    // ── 識別子 ──
    let id = sessionStorage.getItem('sd-id');
    if (!id) { id = Math.random().toString(36).slice(2, 10); sessionStorage.setItem('sd-id', id); }

    const isSecure = location.protocol === 'https:' || location.hostname === 'localhost';
    if (!isSecure) $('https-warn').classList.add('show');

    let role = null, info = null, sensorsOn = false;

    // ── 送信 ──
    function send(action, state) {
      fetch('/api/ctrl/input', {
        method: 'POST', keepalive: true,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, action, state }),
      }).catch(() => { setStatus('送信エラー（同じWi-Fi？）', 'err'); });
    }
    function setStatus(t, cls = '') { statusEl.textContent = t; statusEl.className = cls; }

    // ── 参加 ──
    $('join-btn').addEventListener('click', () => {
      const name = $('name-input').value.trim() || `P-${id.slice(0,4)}`;
      fetch('/api/ctrl/join', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, name }),
      }).then(() => setStatus('参加しました。大画面のスタートを待っています…', 'ok'))
        .catch(() => setStatus('参加できません（同じWi-Fi？）', 'err'));
      $('wait').classList.add('hidden');
      $('role-head').classList.remove('hidden');
    });

    // ── SSE（自分宛の割当を受信）──
    function connect() {
      const es = new EventSource(`/api/ctrl/stream?id=${id}`);
      es.onmessage = (e) => {
        let m; try { m = JSON.parse(e.data); } catch { return; }
        if (m.type === 'assign') applyRole(m.role, m.character);
        else if (m.type === 'gamestate' && m.state === 'LOBBY') {
          setStatus('ロビーに戻りました', '');
        } else if (m.type === 'hello') {
          setStatus('接続OK。なまえを入れて参加してね', 'ok');
        }
      };
      es.onerror = () => setStatus('接続が切れました…再接続中', 'err');
    }
    connect();

    // ── 役割を適用してUIを構築 ──
    function applyRole(r, character) {
      role = r; info = ROLE_INFO[r];
      if (!info) return;
      $('wait').classList.add('hidden');
      $('role-head').classList.remove('hidden');
      $('pad').classList.remove('hidden');
      $('role-icon').textContent = info.icon;
      $('role-label').textContent = info.label;
      $('role-instr').textContent = sensorsOn ? info.instr : '「センサーON」または下のボタンで操作';
      buildPad();
      $('tilt-wrap').classList.toggle('show', info.detectors.some((d) => d.startsWith('tilt')));
      setStatus('あなたの担当：' + info.label, 'ok');
    }

    // ── タップ操作ボタン（センサー無しでも遊べる）──
    function buildPad() {
      const pad = $('pad'); pad.innerHTML = '';
      const has = (a) => info.actions.includes(a);
      const holdBtn = (cls, label, sub, action) => {
        const b = document.createElement('button');
        b.className = `ctrl ${cls}`; b.innerHTML = `${label}<small>${sub}</small>`;
        const down = (e) => { e.preventDefault(); b.classList.add('active'); send(action, 'down'); };
        const up = (e) => { e.preventDefault(); b.classList.remove('active'); send(action, 'up'); };
        b.addEventListener('pointerdown', down);
        b.addEventListener('pointerup', up);
        b.addEventListener('pointercancel', up);
        b.addEventListener('pointerleave', up);
        return b;
      };
      const tapBtn = (cls, label, sub, action) => {
        const b = document.createElement('button');
        b.className = `ctrl ${cls}`; b.innerHTML = `${label}<small>${sub}</small>`;
        b.addEventListener('pointerdown', (e) => { e.preventDefault(); b.classList.add('active'); send(action, 'tap'); });
        b.addEventListener('pointerup', () => b.classList.remove('active'));
        return b;
      };
      if (has('left')) pad.appendChild(holdBtn('c-left', '◀', '左', 'left'));
      if (has('right')) pad.appendChild(holdBtn('c-right', '▶', '右', 'right'));
      if (has('jump')) pad.appendChild(tapBtn('c-jump', '⤴', 'ジャンプ', 'jump'));
      if (has('dash')) pad.appendChild(holdBtn('c-dash', '💨', 'ダッシュ', 'dash'));
      if (has('special')) pad.appendChild(tapBtn('c-special', '🌟', '必殺', 'special'));
    }

    // ── センサー許可 ──
    sensorBtn.addEventListener('click', enableSensors);
    async function enableSensors() {
      if (sensorsOn) return;
      try {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
          const p = await DeviceMotionEvent.requestPermission();
          if (p !== 'granted') return setStatus('モーション許可が必要です', 'err');
        }
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          await DeviceOrientationEvent.requestPermission().catch(() => {});
        }
      } catch { return setStatus('センサーの取得に失敗', 'err'); }
      sensorsOn = true;
      sensorBtn.textContent = 'センサー: ON';
      sensorBtn.classList.add('on');
      if (info) $('role-instr').textContent = info.instr;
      startSensorLoops();
      setStatus('センサーON！' + (info ? info.instr : ''), 'ok');
    }

    // ── 傾き（移動）──
    const TILT_T = 18, TILT_N = 8;
    const tiltState = { left: false, right: false };
    function setHold(action, on) {
      if (!info || !info.actions.includes(action)) return;
      if (tiltState[action] === on) return;
      tiltState[action] = on;
      send(action, on ? 'down' : 'up');
    }
    window.addEventListener('deviceorientation', (e) => {
      if (!sensorsOn || !info) return;
      const g = Math.max(-90, Math.min(90, e.gamma ?? 0));
      $('tilt-needle').style.left = ((g + 90) / 180 * 100) + '%';
      const dets = info.detectors;
      if (dets.includes('tiltLeft')) {
        if (g < -TILT_T) setHold('left', true); else if (g > -TILT_N) setHold('left', false);
      }
      if (dets.includes('tiltRight')) {
        if (g > TILT_T) setHold('right', true); else if (g < TILT_N) setHold('right', false);
      }
      if (dets.includes('tiltBoth')) {
        if (g < -TILT_T) { setHold('left', true); setHold('right', false); }
        else if (g > TILT_T) { setHold('right', true); setHold('left', false); }
        else { setHold('left', false); setHold('right', false); }
      }
    });

    // ── 加速度（ジャンプ/ダッシュ/必殺）──
    const JUMP_T = 13, SPECIAL_T = 17, SHAKE_T = 9;
    let jumpLock = false, specialLock = false;
    let lastShake = 0, dashOn = false;
    let grav = { x: 0, y: 0, z: 0 };
    function startSensorLoops() {
      // ダッシュの静止判定
      setInterval(() => {
        if (!info || !info.detectors.includes('shake')) return;
        if (dashOn && Date.now() - lastShake > 280) { dashOn = false; send('dash', 'up'); }
      }, 120);
    }
    window.addEventListener('devicemotion', (e) => {
      if (!sensorsOn || !info) return;
      let a = e.acceleration;
      if (!a || (a.x == null && a.y == null)) {
        // gravity込みしか取れない端末: ハイパスでgravityを除去
        const ag = e.accelerationIncludingGravity || { x: 0, y: 0, z: 0 };
        grav.x = grav.x * 0.8 + (ag.x || 0) * 0.2;
        grav.y = grav.y * 0.8 + (ag.y || 0) * 0.2;
        grav.z = grav.z * 0.8 + (ag.z || 0) * 0.2;
        a = { x: (ag.x || 0) - grav.x, y: (ag.y || 0) - grav.y, z: (ag.z || 0) - grav.z };
      }
      const mag = Math.hypot(a.x || 0, a.y || 0, a.z || 0);
      const dets = info.detectors;

      if (dets.includes('shakeUp')) {
        if (mag > JUMP_T && !jumpLock) { send('jump', 'tap'); jumpLock = true; flash(); }
        else if (mag < 5) jumpLock = false;
      }
      if (dets.includes('flickDown')) {
        if (mag > SPECIAL_T && !specialLock) { send('special', 'tap'); specialLock = true; flash(); }
        else if (mag < 6) specialLock = false;
      }
      if (dets.includes('shake')) {
        if (mag > SHAKE_T) {
          lastShake = Date.now();
          if (!dashOn) { dashOn = true; send('dash', 'down'); }
        }
      }
    });

    function flash() { document.body.style.background = '#1b2a3a'; setTimeout(() => document.body.style.background = '#0a1018', 90); }
  </script>
</body>
</html>
